# =============================================================================
# Catalog — Coca-Cola CSD portfolio @ SuperValu Ireland
# =============================================================================
# Search-query driven: the scraper runs each query against SuperValu's search,
# extracts every product card, and keeps those matching brand_filter.
# Add coverage by adding a search term — no product IDs to maintain.
#
# sugar_class / variant / container are inferred from the product name in code
# (see classify_* in scraper.py), which powers the Sugar-Tax spread.
# =============================================================================

retailer:
  name: "SuperValu Ireland"
  code: "supervalu_ie"
  rsid: "5550"
  search_url: "https://shop.supervalu.ie/sm/delivery/rsid/{rsid}/results?q={query}"
  currency: "EUR"
  market: "IE"

# Search terms to sweep. Each returns many cards; brand_filter trims to Coca-Cola.
search_queries:
  - "coca cola"
  - "coca cola zero"
  - "diet coke"

# Keep only these brands (case-insensitive). Empty list = keep everything.
brand_filter:
  - "Coca-Cola"

compliance:
  request_delay_seconds: [3, 7]
  max_skus_per_run: 60
  user_agent: "GadielAnalytics-PriceIntel/0.1 (portfolio research; +github.com/Gadx1)"
